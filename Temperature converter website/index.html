<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive, beautiful, and precise Temperature Converter that converts between Fahrenheit, Celsius, and Kelvin in real-time.">
  <title>Temperature Converter</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Linking stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    <div class="converter-card" id="converter-card">
      <!-- iOS-style Status Bar with Theme Switcher -->
      <div class="status-bar">
        <div class="status-left">
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
            <!-- Moon Icon (Visible in Light Mode) -->
            <svg class="theme-icon moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <!-- Sun Icon (Visible in Dark Mode) -->
            <svg class="theme-icon sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          <span class="status-time" id="status-time">9:41</span>
        </div>
        <div class="status-icons">
          <!-- Cellular Signal Bars -->
          <svg class="icon icon-signal" width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
            <rect x="0" y="8" width="3" height="4" rx="0.5"/>
            <rect x="4" y="6" width="3" height="6" rx="0.5"/>
            <rect x="8" y="3" width="3" height="9" rx="0.5"/>
            <rect x="12" y="0" width="3" height="12" rx="0.5"/>
          </svg>
          <!-- Wi-Fi Icon -->
          <svg class="icon icon-wifi" width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
            <path d="M8 12a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm-4.95-4.95a7 7 0 0 1 9.9 0l-1.06 1.06a5.5 5.5 0 0 0-7.78 0L3.05 7.05zm-2.12-2.12a10 10 0 0 1 14.14 0l-1.06 1.06a8.5 8.5 0 0 0-12.02 0L.93 4.93z"/>
          </svg>
          <!-- Battery Icon -->
          <svg class="icon icon-battery" width="22" height="11" viewBox="0 0 22 11" fill="currentColor">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <rect x="2" y="2" width="12" height="7" rx="1.5"/>
            <path d="M20 3.5v4c0 .5-.2.5-.5.5h-.5v-5h.5c.3 0 .5 0 .5.5z"/>
          </svg>
        </div>
      </div>

      <!-- App Title -->
      <header class="app-header">
        <h1 class="app-title">Temperature converter</h1>
      </header>

      <!-- Input Section Grid -->
      <section class="inputs-grid">
        <!-- Degrees Input with Clear Button -->
        <div class="input-group" id="degrees-group">
          <label for="degrees-input" class="input-label">Degrees</label>
          <div class="input-wrapper">
            <input type="text" id="degrees-input" class="text-input" placeholder="72" autocomplete="off" inputmode="decimal">
            <button id="clear-btn" class="clear-input-btn" type="button" aria-label="Clear input">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <div class="focus-line"></div>
          <div class="error-tooltip" id="error-tooltip">Please enter a valid number</div>
        </div>

        <!-- Unit Select -->
        <div class="input-group">
          <label for="unit-select" class="input-label">Type</label>
          <div class="select-wrapper">
            <select id="unit-select" class="custom-select">
              <option value="F">Fahrenheit</option>
              <option value="C">Celsius</option>
              <option value="K">Kelvin</option>
            </select>
            <!-- Dropdown Down Arrow Icon -->
            <svg class="select-arrow" width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="focus-line"></div>
        </div>
      </section>

      <!-- Dynamic Visualizer Gauge -->
      <section class="visualizer-section" id="visualizer-section">
        <div class="visualizer-label-row">
          <span class="visualizer-label">Temperature scale</span>
          <span id="visualizer-temp-text" class="visualizer-value">--</span>
        </div>
        <div class="gauge-track">
          <div id="gauge-fill" class="gauge-fill"></div>
        </div>
        <div class="gauge-scale">
          <span>Freezing</span>
          <span>Pleasant</span>
          <span>Hot</span>
        </div>
      </section>

      <!-- Results Display Section -->
      <section class="results-section">
        <label class="input-label">Result</label>
        
        <!-- Primary Result Field -->
        <div class="result-wrapper">
          <input type="text" id="result-primary" class="result-input" readonly placeholder="--">
          <div class="result-line"></div>
        </div>

        <!-- Secondary Result Field -->
        <div class="result-wrapper secondary-wrapper" id="secondary-result-wrapper">
          <input type="text" id="result-secondary" class="result-input secondary-input" readonly placeholder="--">
          <div class="result-line"></div>
        </div>
      </section>

      <!-- Convert Action Button -->
      <footer class="app-actions">
        <button id="convert-btn" class="btn-convert">Convert</button>
      </footer>
    </div>
  </main>

  <!-- Linking Script -->
  <script src="script.js"></script>
</body>
</html>
